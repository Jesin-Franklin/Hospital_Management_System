<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container fade-in">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-card text-center">
                    <div id="errorMsg" class="text-danger mb-3 text-center fw-bold"></div>
                    
                    <!-- Login view -->
                    <form id="loginForm">
                        <h3 class="mb-4 fw-bold">Sign In</h3>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" placeholder="Username" required>
                            <label for="username">Username</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100 py-3 fw-bold">Sign In</button>
                        <div class="mt-4 text-center">
                            <span class="text-muted">New staff member or patient? </span>
                            <a href="#" id="registerLink" class="text-primary fw-bold text-decoration-none">Register here</a>
                        </div>
                    </form>
                    
                    <!-- Register view -->
                    <form id="registerForm" class="d-none">
                        <h2 class="mb-4" style="font-weight: 700;">Create Account</h2>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="regUsername" placeholder="Username" required>
                            <label for="regUsername">Username</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="regPassword" placeholder="Password" required>
                            <label for="regPassword">Password</label>
                        </div>
                        <div class="form-floating mb-3">
                            <select class="form-select" id="regRole">
                                <option value="PATIENT">Patient</option>
                                <option value="DOCTOR">Doctor</option>
                            </select>
                            <label for="regRole">Role</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="regName" placeholder="Full Name" required>
                            <label for="regName">Full Name</label>
                        </div>
                        <div id="regError" class="alert alert-danger d-none"></div>
                        <button type="submit" class="btn btn-primary-custom w-100 py-3 fw-bold">Register</button>
                        <div class="mt-4 text-center">
                            <span class="text-muted">Already have an account? </span>
                            <a href="#" id="loginLink" class="text-primary fw-bold text-decoration-none">Login here</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- API and Logic scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
