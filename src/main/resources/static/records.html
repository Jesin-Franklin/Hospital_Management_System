<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management - Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="/dashboard.html">HMS</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item me-3 fw-bold" id="userNameDisplay">User Name</li>
                    <li class="nav-item"><button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar py-4 shadow-sm" style="z-index:1;">
                <ul class="nav flex-column">
                    <li class="nav-item mb-2"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="/patients.html">Patients</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="/doctors.html">Doctors</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="/appointments.html">Appointments</a></li>
                    <li class="nav-item mb-2"><a class="nav-link active" href="/records.html">Medical Records</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="/billing.html">Billing</a></li>
                </ul>
            </div>
            <div class="col-md-10 py-5 bg-light" style="min-height: 90vh;">
                <div class="container fade-in">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="fw-bold">Medical Records</h2>
                        <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addRecordModal">Add Record</button>
                    </div>
                    
                    <div class="glass-card mb-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Date</th>
                                        <th>Patient ID</th>
                                        <th>Doctor ID</th>
                                        <th>Diagnosis</th>
                                        <th>Prescription</th>
                                    </tr>
                                </thead>
                                <tbody id="recordsTableBody">
                                    <!-- Dynamic Data -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Add Record Modal -->
    <div class="modal fade" id="addRecordModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Add Medical Record</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="addRecordForm">
                <div class="mb-3">
                    <label>Patient ID</label>
                    <input type="number" class="form-control" id="recPatientId" required>
                </div>
                <div class="mb-3">
                    <label>Doctor ID</label>
                    <input type="number" class="form-control" id="recDoctorId" required>
                </div>
                <div class="mb-3">
                    <label>Diagnosis</label>
                    <textarea class="form-control" id="recDiagnosis" rows="2" required></textarea>
                </div>
                <div class="mb-3">
                    <label>Prescription</label>
                    <textarea class="form-control" id="recPrescription" rows="2" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100">Save Record</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/records.js"></script>
</body>
</html>
