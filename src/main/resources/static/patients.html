<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management - Patients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="/dashboard.html">HMS</a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item me-3 fw-bold" id="userNameDisplay">User Name</li>
                    <li class="nav-item"><button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar py-4 shadow-sm" style="z-index:1;">
                <ul class="nav flex-column" id="sidebarLinks">
                    <li class="nav-item mb-2"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
                    <li class="nav-item mb-2"><a class="nav-link active" href="/patients.html">Patients</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="/doctors.html">Doctors</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="/appointments.html">Appointments</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="/records.html">Medical Records</a></li>
                    <li class="nav-item mb-2"><a class="nav-link" href="/billing.html">Billing</a></li>
                </ul>
            </div>
            <div class="col-md-10 py-5 bg-light" style="min-height: 90vh;">
                <div class="container fade-in">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="fw-bold">Patients Management</h2>
                    </div>
                    
                    <div class="glass-card mb-4">
                        <h4 class="mb-3">All Patients</h4>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Age</th>
                                        <th>Gender</th>
                                        <th>Medical History</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="patientsTableBody">
                                    <!-- Dynamic Data -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Edit Patient Modal -->
    <div class="modal fade" id="editPatientModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Patient</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editPatientForm">
                <input type="hidden" id="editPatientId">
                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" class="form-control" id="editName" required>
                </div>
                <div class="mb-3">
                    <label>Age</label>
                    <input type="number" class="form-control" id="editAge" required>
                </div>
                <div class="mb-3">
                    <label>Gender</label>
                    <select class="form-select" id="editGender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Medical History</label>
                    <textarea class="form-control" id="editHistory" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100">Save Changes</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/patients.js"></script>
</body>
</html>
